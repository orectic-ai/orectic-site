name: Required Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  required-checks-baseline:
    name: Required checks baseline
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate diff whitespace
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            git diff --check HEAD^1..HEAD
          else
            git diff --check
          fi

      - name: Report gate
        run: echo "Required checks baseline passed."
