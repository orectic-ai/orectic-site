name: Required Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  required-checks-baseline:
    name: Required checks baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2
        with:
          fetch-depth: 0

      - name: Validate diff whitespace
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            git diff --check HEAD^1..HEAD
          else
            git diff --check
          fi

      - name: Show Node + npm versions
        run: node --version && npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright Chromium (ephemeral)
        run: |
          npm install --no-save playwright@1.50.0
          npx playwright install --with-deps chromium

      - name: Smoke test SPA mounts content
        run: npm run smoke

      - name: Report gate
        run: echo "Required checks baseline passed."
